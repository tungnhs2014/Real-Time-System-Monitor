# Layer identification
BBPATH .= ":${LAYERDIR}"

# Recipe paths
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

# Layer name
BBFILE_COLLECTIONS += "rpiili9341bsp"

# Recipe pattern match
BBFILE_PATTERN_rpiili9341bsp = "^${LAYERDIR}/"

# Layer priority (higher = more priority)
BBFILE_PRIORITY_rpiili9341bsp = "10"

# Layer compatibility
LAYERDEPENDS_rpiili9341bsp = "core raspberrypi meta-qt6"
LAYERSERIES_COMPAT_rpiili9341bsp = "kirkstone"
